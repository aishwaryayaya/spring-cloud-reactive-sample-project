spring:
  codec:
    max-in-memory-size: 10MB
  reactor:
    netty:
      ioWorkerCount: 10
  cloud:
    gateway:
      httpclient:
        wiretap: true
        connect-timeout: 1000
        response-timeout: 5000


      routes:
        - id: local-test-service
          uri: http://localhost:8082
          predicates:
            - Path=/test/**
          filters:
            - StripPrefix=1
            - name: Prefilter   # Custom request modifier
            - name: PostFilter   # Custom response modifier


server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "*"


reactor:
  netty:
    ioWorkerCount: 10

logging:
  level:
    reactor:
      netty: DEBUG